name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  native-build:
    runs-on: macos-15
    steps:
      # actions/checkout v5.0.0, pinned to an immutable commit.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Test
        run: make test
      - name: Sanitizers
        run: make sanitize
      - name: Build release
        run: make release
